name: Android Build APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Restore Debug Keystore
      run: |
        if [ -f debug.keystore.base64 ]; then
          echo "Restoring debug.keystore from debug.keystore.base64..."
          base64 -d debug.keystore.base64 > debug.keystore
        elif [ ! -z "${{ secrets.DEBUG_KEYSTORE_BASE64 }}" ]; then
          echo "Restoring debug.keystore from GitHub Secrets..."
          echo "${{ secrets.DEBUG_KEYSTORE_BASE64 }}" | base64 -d > debug.keystore
        else
          echo "No saved keystore found. Generating a temporary random one (this will change the signature on every build)..."
          keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 36500 -dname "CN=Android Debug,O=Android,C=US"
        fi

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: 9.3.1
        validate-wrappers: false

    - name: Build Debug APK
      run: gradle :app:assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MovieBox-debug
        path: app/build/outputs/apk/debug/MovieBox-debug.apk
