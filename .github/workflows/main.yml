name: Android Build APK
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Find Gradle Wrapper and Grant Permission
        run: |
          GRADLEW_PATH=$(find . -name "gradlew" -print -quit)
          if [ -z "$GRADLEW_PATH" ]; then
            echo "Không tìm thấy file gradlew nào cả!"
            exit 1
          fi
          echo "Đã tìm thấy gradlew tại: $GRADLEW_PATH"
          chmod +x "$GRADLEW_PATH"
          echo "GRADLEW_DIR=$(dirname "$GRADLEW_PATH")" >> $GITHUB_ENV

      - name: Build Debug APK
        run: |
          cd ${{ env.GRADLEW_DIR }}
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FreeReels-Debug-APK
          path: |
            **/build/outputs/apk/debug/*.apk
